# Docker Compose 配置文件
# 文件名: docker-compose.yml
# 路径: /workspace/deploy/docker-compose.yml

version: '3.8'

services:
  # MySQL 数据库服务
  mysql:
    image: mysql:8.0
    container_name: blog-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: blog_cms
      MYSQL_USER: ${DB_USER:-bloguser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-blogpassword}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - blog-network
    command: 
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password

  # Redis 缓存服务
  redis:
    image: redis:7-alpine
    container_name: blog-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - blog-network
    command: redis-server --appendonly yes

  # Go 后端服务
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: blog-backend
    restart: always
    environment:
      SERVER_PORT: 8080
      SERVER_MODE: release
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-bloguser}
      DB_PASSWORD: ${DB_PASSWORD:-blogpassword}
      DB_NAME: blog_cms
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      SMS_PROVIDER: aliyun
      SMS_ACCESS_ID: ${SMS_ACCESS_ID:-}
      SMS_SECRET: ${SMS_SECRET:-}
      SMS_SIGN_NAME: 博客平台
    ports:
      - "8080:8080"
    volumes:
      - ../backend/static/uploads:/app/static/uploads
    depends_on:
      - mysql
      - redis
    networks:
      - blog-network

  # Vue 前端服务 (生产环境构建)
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: blog-frontend
    restart: always
    networks:
      - blog-network

  # Caddy 反向代理 (自动HTTPS)
  caddy:
    image: caddy:2-alpine
    container_name: blog-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    networks:
      - blog-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  blog-network:
    driver: bridge
